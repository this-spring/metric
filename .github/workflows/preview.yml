name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "site/**"
      - "data/**"
      - "fetcher/**"

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest indicator data
        run: |
          cd fetcher
          pip install -r requirements.txt
          python main.py || true
          cd ..

      - name: Copy data into site public directory
        run: |
          mkdir -p site/public/data
          cp data/*.json site/public/data/ 2>/dev/null || true

      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build preview
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /metric/preview/pr-${{ github.event.pull_request.number }}
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H sspprriinngg.cn >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy preview via rsync
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@sspprriinngg.cn \
            "mkdir -p /var/www/html/metric/preview/pr-${{ github.event.pull_request.number }}/"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            site/out/ ${{ secrets.DEPLOY_USER }}@sspprriinngg.cn:/var/www/html/metric/preview/pr-${{ github.event.pull_request.number }}/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@sspprriinngg.cn \
            "chmod -R 755 /var/www/html/metric/preview/"

      - name: Verify deployment
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://sspprriinngg.cn/metric/preview/pr-${{ github.event.pull_request.number }}/")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Preview deployment verification failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://sspprriinngg.cn/metric/preview/pr-${prNumber}/`;
            const body = `**Preview deployed**: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes('Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
