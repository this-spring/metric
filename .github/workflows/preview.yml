name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "site/**"
      - "data/**"

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Copy data into site public directory
        run: |
          mkdir -p site/public/data
          cp data/*.json site/public/data/ 2>/dev/null || true

      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build preview
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /ai-me/preview/pr-${{ github.event.pull_request.number }}
        run: npm run build

      - name: Deploy preview via rsync
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: sspprriinngg.cn
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          SOURCE: site/out/
          TARGET: /var/www/html/ai-me/preview/pr-${{ github.event.pull_request.number }}/
          ARGS: "-avz --delete"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://sspprriinngg.cn/ai-me/preview/pr-${prNumber}/`;
            const body = `**Preview deployed**: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes('Preview deployed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
