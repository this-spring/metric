name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["Update Market Data"]
    types: [completed]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Copy data into site public directory
        run: |
          mkdir -p site/public/data
          cp data/*.json site/public/data/ 2>/dev/null || true

      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /ai-me
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H sspprriinngg.cn >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create target directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@sspprriinngg.cn \
            "mkdir -p /var/www/html/ai-me/"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --exclude='preview/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            site/out/ ${{ secrets.DEPLOY_USER }}@sspprriinngg.cn:/var/www/html/ai-me/

      - name: Cleanup old PR previews
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@sspprriinngg.cn \
            "rm -rf /var/www/html/ai-me/preview/"
