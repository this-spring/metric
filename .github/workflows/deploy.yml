name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["Update Market Data"]
    types: [completed]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Copy data into site public directory
        run: |
          mkdir -p site/public/data
          cp data/*.json site/public/data/ 2>/dev/null || true

      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /ai-me
        run: npm run build

      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: sspprriinngg.cn
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          SOURCE: site/out/
          TARGET: /var/www/html/ai-me/
          ARGS: "-avz --delete --exclude='preview/'"

      - name: Cleanup old PR previews
        uses: appleboy/ssh-action@v1
        with:
          host: sspprriinngg.cn
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: rm -rf /var/www/html/ai-me/preview/
        
